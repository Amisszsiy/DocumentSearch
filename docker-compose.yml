version: '3.8'
services:
  database:
    image: postgres:17
    hostname: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=12345678Ab
      - POSTGRES_USER=sa
      - POSTGRES_DB=postgre
    volumes:
      - ${USERPROFILE}/postgres_data:/var/lib/postgresql/data

  tokenizer:
    build:
      context: ./tokenizer
      dockerfile: Dockerfile
    hostname: tokenizer
    restart: unless-stopped
    ports:
      - "57100:8000"

  webapi:
    build:
      context: .
      dockerfile: DocumentSearch/Dockerfile
    hostname: webapi
    restart: unless-stopped
    ports:
      - "5079:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres; Port=5432; Username=sa; Password=12345678Ab; Database=postgre
      - ThaiTokenizer__BaseUrl=http://tokenizer:8000
    depends_on:
      - database
      - tokenizer
